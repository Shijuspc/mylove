<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Isha ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(45deg,#ff4b5c,#ff9a9e);
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
}

/* Main box */

.container{
width:90%;
max-width:350px;
z-index:10;
}

/* Heart animation */

.heart{
font-size:70px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* Text */

h1{
font-size:28px;
margin:10px 0;
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4b5c;
margin-top:15px;
}

/* Message */

.message{
display:none;
font-size:20px;
margin-top:15px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* Falling hearts */

.heartbg{
position:absolute;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>

</head>

<body>

<!-- Falling Hearts -->
<script>

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";
heart.className="heartbg";

heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(3+Math.random()*5)+"s";
heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

}

</script>


<div class="container">

<div class="heart">❤️</div>

<h1>Dear Isha ❤️</h1>

<p>My Special Gift For You</p>

<button onclick="showLove()">Open Gift 🎁</button>

<div class="message" id="msg">
I Love You Isha ❤️ <br>
You Are My Sweetest Dream 🌹
</div>

</div>

<script>

function showLove(){
document.getElementById("msg").style.display="block";
}

</script>

</body>
</html>
