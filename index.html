<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Blessy ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(45deg,#ff4b5c,#ff9a9e);
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
}

/* Container */
.container{
width:90%;
max-width:350px;
z-index:10;
}

/* Heart animation */
.heart{
font-size:70px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

h1{
font-size:28px;
margin:10px 0;
}

/* Button */
button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#fff,#ffe0e6);
color:#ff4b5c;
cursor:pointer;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Falling hearts */
.heartbg{
position:absolute;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* Explosion hearts */
.popheart{
position:absolute;
font-size:25px;
animation:pop 2s forwards;
}

@keyframes pop{
0%{transform:scale(0);opacity:1;}
100%{transform:translateY(-200px) scale(1.5);opacity:0;}
}

/* Modal (Full Screen) */
.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
}

/* Slideshow full screen */
.slider img{
width:100vw;
height:100vh;
object-fit:cover;
transition:1s ease-in-out;
}

/* Close button */
.close{
position:absolute;
top:15px;
right:20px;
font-size:30px;
color:white;
cursor:pointer;
z-index:1000;
}

</style>

</head>

<body>

<div class="container">
<div class="heart">❤️</div>
<h1>Dear Blessy ❤️</h1>
<button onclick="openGift()">Open Your Gift 🎁</button>
</div>

<!-- Fullscreen Slideshow -->

<div id="imageModal" class="modal">
  <span class="close" onclick="closeModal()">×</span>
  <div class="slider">
    <img id="slideImage" src="img1.jpg">
  </div>
</div>

<!-- Background Music -->

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* Floating background hearts */
for(let i=0;i<35;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heartbg";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(3+Math.random()*6)+"s";
heart.style.fontSize=(15+Math.random()*30)+"px";
document.body.appendChild(heart);
}

/* Image list */
let images=[
"img1.jpg",
"img2.jpg",
"img3.jpg",
"img4.jpg",
"img5.jpg"
];

let index=0;
let slideInterval;

/* Open Gift */
function openGift(){

// Heart explosion effect
for(let i=0;i<35;i++){
let h=document.createElement("div");
h.innerHTML="💖";
h.className="popheart";
h.style.left=(30+Math.random()*40)+"%";
h.style.bottom="40%";
document.body.appendChild(h);
}

setTimeout(()=>{
document.getElementById("imageModal").style.display="flex";
startSlideshow();
playMusic();
},800);

}

/* Auto slideshow */
function startSlideshow(){
slideInterval=setInterval(()=>{
index=(index+1)%images.length;
document.getElementById("slideImage").src=images[index];
},2500);
}

/* Play music */
function playMusic(){
let music=document.getElementById("bgMusic");
music.volume = 0.7;
music.play().catch(()=>{});
}

/* Close modal */
function closeModal(){
document.getElementById("imageModal").style.display="none";
clearInterval(slideInterval);
let music=document.getElementById("bgMusic");
music.pause();
music.currentTime=0;
}

</script>

</body>
</html>
